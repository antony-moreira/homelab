version: "3.7"
services:
  timemachine:
    network_mode: "host"
    environment:
      - TM_USERNAME=timemachine
      - TM_GROUPNAME=timemachine
      - PASSWORD=${TM_PASSWORD}
      - TM_UID=1000
      - TM_GID=1000
      - SET_PERMISSIONS=false
      - VOLUME_SIZE_LIMIT=0
    restart: unless-stopped
    ports:
      - "137:137/udp"
      - "138:138/udp"
      - "139:139"
      - "445:445"
    volumes:
      - /home/antony/apps/timemachine:/home/antony/apps/timemachine
    tmpfs:
      - /run/samba
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    container_name: timemachine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
    image: mbentley/timemachine:smb