services:
  mcp-ssh-server:
    image: mcp-ssh-server:latest
    container_name: mcp-ssh-server
    restart: unless-stopped
    networks:
      - traefik
    ports:
      - 8765:8765
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/antony/.ssh:/root/.ssh:ro
    environment:
      - MCP_PORT=${MCP_PORT}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_PUBLIC_DOMAIN=${MCP_PUBLIC_DOMAIN}
      - PROXMOX_LEON_IP=${PROXMOX_LEON_IP}
      - PROXMOX_CLAIRE_IP=${PROXMOX_CLAIRE_IP}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      - SSH_USER=${SSH_USER}
      - SSH_HOST_HOMELAB=${SSH_HOST_HOMELAB}
    labels:
      - "traefik.enable=true"
      # rota local (Tailscale) via HTTPS
      - "traefik.http.routers.mcp-ssh-server.rule=Host(`${MCP_DOMAIN}`)"
      - "traefik.http.routers.mcp-ssh-server.entrypoints=websecure"
      - "traefik.http.routers.mcp-ssh-server.tls=true"
      - "traefik.http.routers.mcp-ssh-server.tls.certresolver=cloudflare"
      # rota pública via Cloudflare Tunnel (entrypoint tunnel porta 8080)
      - "traefik.http.routers.mcp-ssh-server-tunnel.rule=Host(`${MCP_PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.mcp-ssh-server-tunnel.entrypoints=tunnel"
      - "traefik.http.services.mcp-ssh-server.loadbalancer.server.port=8765"

networks:
  traefik:
    external: true
