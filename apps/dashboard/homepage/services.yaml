- Infraestrutura:
    - Proxmox Leon:
        icon: proxmox.png
        href: "https://{{HOMEPAGE_VAR_PROXMOX_LEON_HOME_DOMAIN}}"
        description: Hypervisor Leon
        widget:
          type: proxmox
          url: "https://{{HOMEPAGE_VAR_PROXMOX_LEON_IP}}:8006"
          username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}"
