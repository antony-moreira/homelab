- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: "https://{{HOMEPAGE_VAR_JELLYFIN_HOME_DOMAIN}}"
        description: Media Server
        widget:
          type: jellyfin
          url: "http://{{HOMEPAGE_VAR_SERVER_IP}}:8096"
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"

    - Plex:
        icon: plex.png
        href: "https://{{HOMEPAGE_VAR_PLEX_HOME_DOMAIN}}"
        description: Media Server
        widget:
          type: plex
          url: "http://{{HOMEPAGE_VAR_SERVER_IP}}:32400"
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"

    - Overseerr:
        icon: overseerr.png
        href: "https://{{HOMEPAGE_VAR_OVERSEERR_HOME_DOMAIN}}"
        description: Requisicoes de midia
        widget:
          type: overseerr
          url: "http://{{HOMEPAGE_VAR_SERVER_IP}}:5055"
          key: "{{HOMEPAGE_VAR_OVERSEERR_API_KEY}}"

