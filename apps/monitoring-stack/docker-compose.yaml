---
networks:
  monitoring:
    driver: bridge
  traefik:
    external: true

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:

services:
  netdata:
    image: netdata/netdata
    container_name: netdata
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1g
    hostname: homelab
    pid: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    networks:
      - monitoring
      - traefik
    ports:
      - 19999:19999
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt:/mnt:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.netdata.rule=Host(`${NETDATA_DOMAIN}`) || Host(`${NETDATA_HOME_DOMAIN}`)"
      - "traefik.http.routers.netdata.entrypoints=websecure"
      - "traefik.http.routers.netdata.tls=true"
      - "traefik.http.routers.netdata.tls.certresolver=cloudflare"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /mnt:/mnt:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/.+|rootfs/var/lib/kubelet/.+|rootfs/var/lib/containerd/.+)($$|/)'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$'
      - '--no-collector.ipvs'

  prometheus:
    image: prom/prometheus:latest
    user: "1000"
    container_name: prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768m
    restart: unless-stopped
    volumes:
      - /home/antony/apps/monitoring-stack/prometheus.yml:/etc/prometheus/prometheus.yml
      - /home/antony/apps/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - 9090:9090
    networks:
      - monitoring
      - traefik
    depends_on:
      - netdata
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_DOMAIN}`) || Host(`${PROMETHEUS_HOME_DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:latest
    user: "1000"
    container_name: grafana
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
    restart: unless-stopped
    ports:
      - 3003:3000
    volumes:
      - /home/antony/apps/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - /home/antony/apps/grafana:/var/lib/grafana
    networks:
      - monitoring
      - traefik
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`) || Host(`${GRAFANA_HOME_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
