# Netdata tuning — reduz polling agressivo do plugin cgroups/docker
#
# PROBLEMA: netdata default coleta cgroups (métricas de todos os containers)
# a cada 1s. Em CPU fraco (N5095) isso faz dockerd+containerd subirem a ~156%
# combinados, gerando calor (Leon chegou a 88°C).
#
# SOLUÇÃO: reduzir frequência de coleta. Ganho medido: dockerd 67%→1%, -8°C.
#
# APLICAR: o netdata.conf vive no volume Docker `monitoring-stack_netdataconfig`
# (NÃO é sincronizado pelo Dockhand). Aplicar manualmente:
#
#   docker exec netdata bash -c 'cat >> /etc/netdata/netdata.conf << EOF
#   <conteúdo abaixo>
#   EOF'
#   docker restart netdata
#
# Verificar: docker exec netdata grep -A1 'plugin:cgroups' /etc/netdata/netdata.conf

[global]
    # Coleta global a cada 5s (default 1s)
    update every = 5

[plugin:cgroups]
    # Métricas de containers a cada 30s (default 1s) — principal economia
    update every = 30
    enable new cgroups detected at runtime = yes

[plugin:proc:/proc/diskstats]
    update every = 10
