services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    networks:
      - traefik

    ports:
      - "80:80"
      - "443:443"

    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/antony/apps/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /home/antony/apps/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /home/antony/apps/traefik/acme.json:/acme.json

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth@docker"

      - "traefik.http.routers.traefik-tunnel.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.traefik-tunnel.entrypoints=tunnel"
      - "traefik.http.routers.traefik-tunnel.service=api@internal"
      - "traefik.http.routers.traefik-tunnel.middlewares=auth@docker"

      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - /home/antony/apps/traefik/cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - traefik

networks:
  traefik:
    external: true