---
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - VERSION=docker
    volumes:
      - /home/antony/apps/plex:/config
      - /mnt/media/Filmes:/data/movies
      - /mnt/media/Series:/data/tv 
#     - PATH-TO-ARCHIVES:/data/movies
    devices:
      - /dev/dri:/dev/dri 
    restart: unless-stopped
