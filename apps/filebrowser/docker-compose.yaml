services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: "1000:1000"
    ports:
      - "8181:80"
    volumes:
      - /home/antony:/srv
      - /home/antony/apps/filebrowser/config:/config
      - /home/antony/apps/filebrowser/database.db:/database.db
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped